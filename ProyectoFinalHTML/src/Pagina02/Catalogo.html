<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CATÁLOGO DE PRODUCTOS</title>
    <link href="Pagina02%20Style.css" rel="stylesheet">
</head>
<body>

<header>
    <div class="row-1">
        <div class="Logo">
            <img src="File/Logo01.jpeg" alt="Vallhala">
        </div>

        <div><h2>QUIENES <br> SOMOS</h2></div>
        <div><h2>PROTECCIÓN <br> CERTIFICADOS</h2></div>
        <div><h2>SERVICIOS <br> INDUSTRIALES</h2></div>
        <div><h2>NORMAS Y <br> LEYES</h2></div>
        <div><h2>CONTACTANOS</h2></div>

        <div class="Boton-1-1">
            <button class="btn-principal">
                SOLICITAR ASESORÍA <br> TÉCNICA
            </button>
        </div>
    </div>
</header>

<main class="container">

    <div class="row-2">
        <h2>CATÁLOGO DE PRODUCTOS</h2>
    </div>

    <section class="tarjetas">

        <div class="tarjeta bg-andamios">
            <h3>ANDAMIOS INDUSTRIALES</h3>
            <button class="btn-card">VER DETALLES</button>
        </div>

        <div class="tarjeta bg-cascos">
            <h3>CASCOS DE SEGURIDAD</h3>
            <button class="btn-card">VER DETALLES</button>
        </div>

        <div class="tarjeta bg-extintores">
            <h3>EXTINTORES Y SUPRESIÓN</h3>
            <button class="btn-card">VER DETALLES</button>
        </div>

        <div class="tarjeta bg-caidas">
            <h3>PROTECCIÓN CONTRA CAÍDAS</h3>
            <button class="btn-card">VER DETALLES</button>
        </div>

        <div class="tarjeta bg-trajes">
            <h3>TRAJES ESPECIALIZADOS</h3>
            <button class="btn-card">VER DETALLES</button>
        </div>

        <div class="tarjeta bg-senales">
            <h3>SEÑALES DE PRECAUCIÓN</h3>
            <button class="btn-card">VER DETALLES</button>
        </div>

    </section>

    <div class="cta">
        <button class="btn-consulta">HACER CONSULTA</button>
    </div>

</main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF8">
        <title>VALHALLA</title>
        <link rel="stylesheet" href="Pagina04%20Style.css">
    </head>
    <body>
        <!--Esto es la cabecera-->
        <header>
            <div class="row-1">
                <div class="Logo">
                <img src="File/logo_vallhala.png" width="200" height=100>

                </div>
                <div class="Nosotros">
                <h2>QUIENES <br> SOMOS</h2>

                </div>
                <div class="Proteccion">
                <h2>PROTECCIÓN <br> CERTIFICADOS</h2>

                </div>
                <div class="Servicios">
                <h2>SERVICIOS <br> INDUSTRIALES</h2>

                </div>
                <div class="Normas">
                <h2>NORMAS Y <br> LEYES</h2>

                </div>
                <div class="Contacto">
                <h2>CONTACTANOS</h2>

                </div>
                <div class="Boton-1-1">
                <button>
                    <h3>SOLICITAR ASESORÍA <br> TÉCNICA</h3>

                </button>


                </div>
            </div>
        </header>
        <!--El texto de SOLICITAR COTIZACIÓN DE EQUIPOS DE SEGURIDAD-->
        <div class="container">

                <h2 class="titulo">SOLICITAR COTIZACIÓN DE EQUIPOS DE SEGURIDAD</h2>

            <div class="formulario">
                <div class="columna">
                    <input type="text" placeholder="NOMBRE COMPLETO">
                    <input type="text" placeholder="EMAIL PROFESIONAL">

                    <select>
                        <option>CATEGORIA DE PRODUCTO</option>
                        <option>Andamios</option>
                        <option>Extintores</option>
                        <option>Protección de caídas</option>
                    </select>
                    <div class="info-contacto">
                        <div class="item">
                            <img src="File/telefono.png" class="icono">
                            <p>+258 334 300</p>
                        </div>
                        <div class="item">
                            <img src="File/email.png" class="icono">
                            <p>info@safeguard.com</p>
                        </div>
                        <div class="item">
                            <img src="File/ubicacion.png" class="icono">
                            <p>Via. Safeguard Industrial</p>
                        </div>
                    </div>
                </div>
                <div class="columna">
                    <input type="text" placeholder="EMPRESA">
                    <input type="text" placeholder="TELÉFONO">
                    <textarea placeholder>ENVIAR SOLICITUD</textarea>
                    <button class="btn-enviar">ENVIAR SOLICITUD</button>
                </div>
            </div>
        </div>
        
    </body>
</html>
